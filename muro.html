<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Muro Magallanes</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #080c18;
  color: white;
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  padding-bottom: 60px;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #0d1f3c, #1a3a6b);
  padding: 28px 20px 24px;
  text-align: center;
  border-bottom: 1px solid rgba(93,173,226,0.15);
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(93,173,226,0.2) 0%, transparent 70%);
}
.header-escudo {
  width: 64px; height: 64px;
  object-fit: contain;
  margin-bottom: 10px;
  position: relative; z-index: 1;
  filter: drop-shadow(0 0 12px rgba(93,173,226,0.4));
}
.header h1 {
  font-family: 'Bebas Neue', cursive;
  font-size: 28px; letter-spacing: 3px;
  color: white; position: relative; z-index: 1;
}
.header p {
  font-size: 12px; font-weight: 700;
  color: rgba(255,255,255,0.4);
  letter-spacing: 2px; margin-top: 4px;
  position: relative; z-index: 1;
}
.partido-info {
  background: rgba(93,173,226,0.1);
  border: 1px solid rgba(93,173,226,0.2);
  border-radius: 10px;
  padding: 8px 16px;
  display: inline-block;
  margin-top: 12px;
  font-family: 'Fredoka One', cursive;
  font-size: 15px;
  color: #5dade2;
  position: relative; z-index: 1;
}

/* ── CONTAINER ── */
.container { max-width: 600px; margin: 0 auto; padding: 16px; }

/* ── FORM NUEVO MENSAJE ── */
.form-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
}
.form-title {
  font-family: 'Bebas Neue', cursive;
  font-size: 14px; letter-spacing: 3px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 14px;
}
.form-input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 12px 14px;
  color: white;
  font-family: 'Nunito', sans-serif;
  font-size: 14px; font-weight: 700;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 10px;
}
.form-input:focus { border-color: rgba(93,173,226,0.5); }
.form-input::placeholder { color: rgba(255,255,255,0.2); }
textarea.form-input { resize: none; min-height: 90px; }

.char-count {
  text-align: right;
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  font-weight: 700;
  margin-bottom: 10px;
  margin-top: -6px;
}

.btn-enviar {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #1a5276, #2e86c1);
  border: none; border-radius: 14px;
  color: white;
  font-family: 'Bebas Neue', cursive;
  font-size: 16px; letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: 0 4px 14px rgba(46,134,193,0.3);
}
.btn-enviar:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(46,134,193,0.4); }
.btn-enviar:active { transform: translateY(0); }

.pendiente-aviso {
  text-align: center;
  font-size: 12px;
  color: rgba(255,255,255,0.25);
  margin-top: 10px;
  font-weight: 700;
}

/* ── MENSAJES APROBADOS ── */
.mensajes-titulo {
  font-family: 'Bebas Neue', cursive;
  font-size: 13px; letter-spacing: 4px;
  color: rgba(255,255,255,0.3);
  margin-bottom: 12px;
  text-align: center;
}

.mensaje-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 16px;
  padding: 16px 18px;
  margin-bottom: 10px;
  position: relative;
  animation: fadein 0.4s ease;
}
@keyframes fadein {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.mensaje-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.mensaje-autor {
  font-family: 'Fredoka One', cursive;
  font-size: 15px; color: #5dade2;
  display: flex; align-items: center; gap: 6px;
}
.mensaje-rol {
  font-size: 10px; font-weight: 800;
  color: rgba(255,255,255,0.25);
  letter-spacing: 1px;
  background: rgba(255,255,255,0.05);
  padding: 2px 8px; border-radius: 10px;
}
.mensaje-texto {
  font-size: 15px; font-weight: 700;
  line-height: 1.6;
  color: rgba(255,255,255,0.85);
}
.mensaje-hora {
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  font-weight: 700;
  margin-top: 8px;
}

/* Colores por rol */
.rol-papa    .mensaje-autor { color: #5dade2; }
.rol-mama    .mensaje-autor { color: #fd79a8; }
.rol-jugador .mensaje-autor { color: #2ecc71; }
.rol-dt      .mensaje-autor { color: #f1c40f; }

/* ── DT PANEL ── */
.dt-panel {
  background: rgba(241,196,15,0.04);
  border: 1px solid rgba(241,196,15,0.15);
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 20px;
  display: none;
}
.dt-panel-title {
  font-family: 'Bebas Neue', cursive;
  font-size: 13px; letter-spacing: 3px;
  color: #f1c40f; margin-bottom: 12px;
}
.pendiente-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 8px;
}
.pendiente-texto {
  font-size: 14px; font-weight: 700;
  color: rgba(255,255,255,0.75);
  margin-bottom: 6px; line-height: 1.5;
}
.pendiente-autor {
  font-size: 12px; color: rgba(255,255,255,0.35);
  font-weight: 700; margin-bottom: 10px;
}
.pendiente-btns { display: flex; gap: 8px; }
.btn-aprobar {
  flex: 1; padding: 9px;
  background: linear-gradient(135deg, #1e8449, #27ae60);
  border: none; border-radius: 10px;
  color: white; font-family: 'Bebas Neue', cursive;
  font-size: 14px; letter-spacing: 1px; cursor: pointer;
}
.btn-rechazar {
  flex: 1; padding: 9px;
  background: rgba(231,76,60,0.15);
  border: 1px solid rgba(231,76,60,0.3);
  border-radius: 10px;
  color: #e74c3c; font-family: 'Bebas Neue', cursive;
  font-size: 14px; letter-spacing: 1px; cursor: pointer;
}
.btn-borrar-msg {
  position: absolute; top: 12px; right: 12px;
  background: transparent; border: none;
  color: rgba(255,255,255,0.15); font-size: 14px;
  cursor: pointer; padding: 4px;
}
.btn-borrar-msg:hover { color: #e74c3c; }

/* ── EMPTY ── */
.empty {
  text-align: center; padding: 40px 20px;
  color: rgba(255,255,255,0.2);
}
.empty .ico { font-size: 48px; display: block; margin-bottom: 10px; }
.empty p { font-family: 'Fredoka One', cursive; font-size: 16px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #27ae60; color: white;
  padding: 12px 24px; border-radius: 30px;
  font-family: 'Fredoka One', cursive; font-size: 15px;
  z-index: 999; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── DT BADGE ── */
.dt-badge {
  position: fixed; bottom: 20px; right: 16px;
  background: rgba(241,196,15,0.15);
  border: 1px solid rgba(241,196,15,0.3);
  border-radius: 30px; padding: 8px 14px;
  font-family: 'Bebas Neue', cursive;
  font-size: 12px; letter-spacing: 2px; color: #f1c40f;
  cursor: pointer; display: none;
  z-index: 100;
}
</style>
</head>
<body>

<div class="header">
  <img class="header-escudo" src="escudo.png" onerror="this.style.display='none'"/>
  <h1>💬 MURO MAGALLANES</h1>
  <p>MENSAJES PARA EL EQUIPO</p>
  <div class="partido-info" id="partidoInfo">⚽ Cargando próximo partido...</div>
</div>

<div class="container">

  <!-- DT: mensajes pendientes -->
  <div class="dt-panel" id="dtPanel">
    <div class="dt-panel-title">⏳ PENDIENTES DE APROBACIÓN</div>
    <div id="pendientesList"></div>
  </div>

  <!-- Form nuevo mensaje -->
  <div class="form-card">
    <div class="form-title">✍️ DEJÁ TU MENSAJE</div>

    <input type="text" class="form-input" id="inputNombre" placeholder="Tu nombre (ej: Papá de Nachi)"/>

    <select class="form-input" id="inputRol" style="cursor:pointer">
      <option value="papa">👨 Papá</option>
      <option value="mama">👩 Mamá</option>
      <option value="jugador">⚽ Jugador</option>
      <option value="familiar">❤️ Familiar</option>
    </select>

    <textarea class="form-input" id="inputMensaje" placeholder="Tu mensaje de aliento para el equipo..." maxlength="200" oninput="updateChar()"></textarea>
    <div class="char-count"><span id="charCount">0</span>/200</div>

    <button class="btn-enviar" onclick="enviarMensaje()">📨 ENVIAR MENSAJE</button>
    <div class="pendiente-aviso">Tu mensaje será visible una vez aprobado por el DT</div>
  </div>

  <!-- Mensajes aprobados -->
  <div class="mensajes-titulo" id="muroTitulo">ALIENTO DEL EQUIPO</div>
  <div id="mensajesList"></div>

</div>

<div class="toast" id="toast"></div>
<div class="dt-badge" id="dtBadge" onclick="toggleDtPanel()">🔑 DT</div>

<script>
// ── DATA ──────────────────────────────────────────────────
var mensajes    = JSON.parse(localStorage.getItem('muro_mensajes')    || '[]');
var pendientes  = JSON.parse(localStorage.getItem('muro_pendientes')  || '[]');
var dtMode      = false;

// ── PARTIDO INFO ─────────────────────────────────────────
var proximo = JSON.parse(localStorage.getItem('mag_proximo') || 'null');
if (proximo && proximo.rival) {
  document.getElementById('partidoInfo').textContent = '⚽ vs ' + proximo.rival + (proximo.fecha ? ' · ' + new Date(proximo.fecha+'T12:00:00').toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'}) : '');
} else {
  document.getElementById('partidoInfo').textContent = '⚽ Magallanes FC';
}

// ── RENDER MENSAJES ───────────────────────────────────────
function renderMensajes() {
  var el = document.getElementById('mensajesList');
  var tit = document.getElementById('muroTitulo');

  if (!mensajes.length) {
    el.innerHTML = '<div class="empty"><span class="ico">💬</span><p>Sé el primero en dejar tu aliento</p></div>';
    return;
  }

  tit.textContent = 'ALIENTO DEL EQUIPO · ' + mensajes.length + ' MENSAJE' + (mensajes.length!==1?'S':'');
  el.innerHTML = '';

  mensajes.slice().reverse().forEach(function(m, i) {
    var realIdx = mensajes.length - 1 - i;
    var rolLabel = {papa:'Papá', mama:'Mamá', jugador:'Jugador', familiar:'Familiar', dt:'DT'}[m.rol] || m.rol;
    var div = document.createElement('div');
    div.className = 'mensaje-card rol-' + m.rol;
    div.innerHTML =
      (dtMode ? '<button class="btn-borrar-msg" onclick="borrarMensaje('+realIdx+')">✕</button>' : '') +
      '<div class="mensaje-header">' +
        '<div class="mensaje-autor">' + m.nombre + '</div>' +
        '<span class="mensaje-rol">' + rolLabel + '</span>' +
      '</div>' +
      '<div class="mensaje-texto">' + escapeHtml(m.texto) + '</div>' +
      '<div class="mensaje-hora">' + m.hora + '</div>';
    el.appendChild(div);
  });
}

// ── RENDER PENDIENTES (DT) ────────────────────────────────
function renderPendientes() {
  var panel = document.getElementById('dtPanel');
  var el    = document.getElementById('pendientesList');
  if (!dtMode) { panel.style.display='none'; return; }

  if (!pendientes.length) {
    panel.style.display = 'none';
    return;
  }

  panel.style.display = 'block';
  el.innerHTML = '';
  pendientes.forEach(function(p, i) {
    var div = document.createElement('div');
    div.className = 'pendiente-card';
    div.innerHTML =
      '<div class="pendiente-texto">"' + escapeHtml(p.texto) + '"</div>' +
      '<div class="pendiente-autor">' + p.nombre + ' · ' + p.hora + '</div>' +
      '<div class="pendiente-btns">' +
        '<button class="btn-aprobar"  onclick="aprobar('+i+')">✅ APROBAR</button>' +
        '<button class="btn-rechazar" onclick="rechazar('+i+')">✕ RECHAZAR</button>' +
      '</div>';
    el.appendChild(div);
  });
}

// ── ENVIAR ────────────────────────────────────────────────
function enviarMensaje() {
  var nombre  = document.getElementById('inputNombre').value.trim();
  var rol     = document.getElementById('inputRol').value;
  var texto   = document.getElementById('inputMensaje').value.trim();

  if (!nombre) { toast('Ingresá tu nombre', '#e74c3c'); return; }
  if (!texto)  { toast('Escribí un mensaje', '#e74c3c'); return; }
  if (texto.length > 200) { toast('Máximo 200 caracteres', '#e74c3c'); return; }

  var msg = {
    nombre: nombre,
    rol:    rol,
    texto:  texto,
    hora:   new Date().toLocaleString('es-AR', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})
  };

  if (dtMode) {
    // DT: aprobación directa
    mensajes.push(msg);
    localStorage.setItem('muro_mensajes', JSON.stringify(mensajes));
    toast('✅ Mensaje publicado', '#27ae60');
  } else {
    pendientes.push(msg);
    localStorage.setItem('muro_pendientes', JSON.stringify(pendientes));
    toast('📨 Mensaje enviado — el DT lo revisará', '#3498db');
  }

  document.getElementById('inputMensaje').value = '';
  document.getElementById('charCount').textContent = '0';
  renderMensajes();
  renderPendientes();
}

// ── APROBAR / RECHAZAR ───────────────────────────────────
function aprobar(idx) {
  var msg = pendientes.splice(idx, 1)[0];
  mensajes.push(msg);
  localStorage.setItem('muro_mensajes',   JSON.stringify(mensajes));
  localStorage.setItem('muro_pendientes', JSON.stringify(pendientes));
  toast('✅ Publicado', '#27ae60');
  renderMensajes();
  renderPendientes();
}

function rechazar(idx) {
  pendientes.splice(idx, 1);
  localStorage.setItem('muro_pendientes', JSON.stringify(pendientes));
  toast('🗑 Rechazado', '#e74c3c');
  renderPendientes();
}

function borrarMensaje(idx) {
  if (!confirm('¿Borrar este mensaje?')) return;
  mensajes.splice(idx, 1);
  localStorage.setItem('muro_mensajes', JSON.stringify(mensajes));
  renderMensajes();
}

// ── DT MODE ──────────────────────────────────────────────
var pinSeq = '';
document.addEventListener('keydown', function(e) {
  pinSeq += e.key;
  if (pinSeq.length > 6) pinSeq = pinSeq.slice(-6);
  if (pinSeq.includes('1313')) { activarDT(); pinSeq = ''; }
});

var tapCount = 0, tapTimer;
document.querySelector('.header').addEventListener('click', function() {
  tapCount++;
  clearTimeout(tapTimer);
  tapTimer = setTimeout(function(){ tapCount=0; }, 1500);
  if (tapCount >= 5) {
    tapCount = 0;
    var pin = prompt('PIN DT:');
    if (pin === '1313') activarDT();
  }
});

function activarDT() {
  dtMode = true;
  document.getElementById('dtBadge').style.display = 'block';
  renderMensajes();
  renderPendientes();
  toast('🔑 Modo DT activado', '#f1c40f');
}

function toggleDtPanel() {
  var p = document.getElementById('dtPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

// ── HELPERS ──────────────────────────────────────────────
function updateChar() {
  var v = document.getElementById('inputMensaje').value;
  document.getElementById('charCount').textContent = v.length;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, color) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.background = color || '#27ae60';
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

// ── INIT ─────────────────────────────────────────────────
renderMensajes();
renderPendientes();
</script>
</body>
</html>
